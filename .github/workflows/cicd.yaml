name: octa-pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_FRONTEND: octa-frontend-repo
  ECR_BACKEND: octa-backend-repo

jobs:
  # =========================
  # 1. TEST (unit & integration)
  # =========================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend Tests
        run: |
          cd backend
          npm install
          npm test || true

      - name: Frontend Tests
        run: |
          cd frontend
          npm install
          npm test -- --passWithNoTests || true

  # =========================
  # 2. BUILD, SCAN, SMOKE TEST & PUSH (only on merge to main)
  # =========================
  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Vulnerability scan on source code
      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1               # Fail on CRITICAL/HIGH
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      # Build images
      - name: Build Frontend Image
        run: docker build -t frontend ./frontend

      - name: Build Backend Image
        run: docker build -t backend ./backend

      # Smoke test images before push
      - name: Smoke Test Backend
        run: |
          docker run -d -p 5001:5000 --name backend-test backend:latest
          sleep 5
          curl --fail http://localhost:5001/api/health || (docker logs backend-test && exit 1)
          docker stop backend-test && docker rm backend-test

      - name: Smoke Test Frontend
        run: |
          docker run -d -p 8080:80 --name frontend-test frontend:latest
          sleep 3
          curl --fail http://localhost:8080 || (docker logs frontend-test && exit 1)
          docker stop frontend-test && docker rm frontend-test

      # Vulnerability scan on images
      - name: Trivy Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Trivy Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: backend:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      # Tag and push to ECR (both latest and commit SHA)
      - name: Tag & Push Frontend
        run: |
          docker tag frontend:latest ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:latest
          docker tag frontend:latest ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:${{ github.sha }}
          docker push ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:latest
          docker push ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:${{ github.sha }}

      - name: Tag & Push Backend
        run: |
          docker tag backend:latest ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:latest
          docker tag backend:latest ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:${{ github.sha }}
          docker push ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:latest
          docker push ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:${{ github.sha }}

  # =========================
  # 3. PRODUCTION DEPLOYMENT (requires manual approval)
  # =========================
  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production          # Manual approval configured here
    env:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p $HOME/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > $HOME/.ssh/key.pem
          chmod 600 $HOME/.ssh/key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> $HOME/.ssh/known_hosts

      - name: Deploy to Production
        shell: bash
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i $HOME/.ssh/key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            sudo systemctl start docker || true
            
            # 1. Login to ECR
            aws ecr get-login-password --region ap-south-1 | sudo docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com

            # 2. Download RDS SSL Certificate
            sudo rm -rf /home/ubuntu/global-bundle.pem
            curl -o /home/ubuntu/global-bundle.pem https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem

            # 3. Pull and Run Containers
            sudo docker pull $ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/octa-backend-repo:latest
            sudo docker pull $ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/octa-frontend-repo:latest
            
            sudo docker stop backend frontend || true
            sudo docker rm backend frontend || true
            
            sudo docker run -d -p 5000:5000 --name backend \
              -v /home/ubuntu/global-bundle.pem:/opt/app/global-bundle.pem \
              -e DB_USER=${{ secrets.DB_USER || 'octaadmin' }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD || 'Octabyte123' }} \
              -e DB_NAME=${{ secrets.DB_NAME || 'octabytedb' }} \
              -e DB_HOST=my-postgres-db.cnkkua2ykiim.ap-south-1.rds.amazonaws.com \
              -e PGSSLROOTCERT=/opt/app/global-bundle.pem \
              $ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/octa-backend-repo:latest
            
            sudo docker run -d -p 80:80 --name frontend \
              $ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/octa-frontend-repo:latest
            
            sleep 5
            curl --fail http://localhost:80 || exit 1
            curl --fail http://localhost:5000/api/health || exit 1
          EOF

  # =========================
  # 4. SUCCESS NOTIFICATION (Slack + Email)
  # =========================
  notify_success:
    needs: deploy-production
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Slack Success
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"✅ Octa production deployment successful"}' \
          ${{ secrets.SLACK_WEBHOOK }}

      - name: Email Success
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ Octa Production Deployment Success"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: "GitHub Actions <${{ secrets.SMTP_FROM_EMAIL }}>"
          body: |
            Production deployment succeeded.
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

  # =========================
  # 5. FAILURE NOTIFICATION (Slack + Email)
  # =========================
  notify_failure:
    needs: [test, build, deploy-production]
    if: failure() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Slack Failure
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ Octa pipeline failed"}' \
          ${{ secrets.SLACK_WEBHOOK }}

      - name: Email Failure
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ Octa Pipeline Failed"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: "GitHub Actions <${{ secrets.SMTP_FROM_EMAIL }}>"
          body: |
            Pipeline failed. Check Actions tab.
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
