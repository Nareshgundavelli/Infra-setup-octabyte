name: octa-pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_FRONTEND: octa-frontend-repo
  ECR_BACKEND: octa-backend-repo

jobs:

  # =========================
  # TEST JOB
  # =========================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend Test
        run: |
          cd backend
          npm install
          npm test || true

      - name: Frontend Test
        run: |
          cd frontend
          npm install
          npm test -- --passWithNoTests || true

  # =========================
  # BUILD & PUSH DOCKER IMAGES
  # =========================
  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ---------- FRONTEND ----------
      - name: Build Frontend Docker Image
        run: |
          docker build -t frontend ./frontend

      - name: Tag Frontend Docker Image
        run: |
          docker tag frontend:latest \
          ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:latest

      - name: Push Frontend Docker Image
        run: |
          docker push \
          ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:latest

      # ---------- BACKEND ----------
      - name: Build Backend Docker Image
        run: |
          docker build -t backend ./backend

      - name: Tag Backend Docker Image
        run: |
          docker tag backend:latest \
          ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:latest

      - name: Push Backend Docker Image
        run: |
          docker push \
          ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:latest

  # =========================
  # DEPLOY TO EC2
  # =========================
  deploy:
    needs: build
    runs-on: ubuntu-latest

    env:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SSH
        shell: bash
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p $HOME/.ssh
          printf "%s" "$EC2_SSH_KEY" > $HOME/.ssh/key.pem
          # Ensure file ends with a newline and has correct permissions
          sed -i '$a\' $HOME/.ssh/key.pem
          chmod 600 $HOME/.ssh/key.pem
          
          echo "Checking SSH key fingerprint..."
          ssh-keygen -l -f $HOME/.ssh/key.pem || echo "Error: Invalid key format"
          
          ssh-keyscan -H -T 10 "$EC2_HOST" >> $HOME/.ssh/known_hosts || true

      - name: Deploy Application
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
        run: |
          ssh -o StrictHostKeyChecking=no -i $HOME/.ssh/key.pem ubuntu@$EC2_HOST << EOF
            # 1. Install Docker if missing
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            # 2. Install AWS CLI if missing
            if ! command -v aws &> /dev/null; then
              echo "Installing AWS CLI..."
              sudo apt-get install -y unzip
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip awscliv2.zip
              sudo ./aws/install
              rm -rf awscliv2.zip ./aws
            fi

            # 3. Login to ECR (Injecting credentials for immediate success)
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_KEY }}
            export AWS_DEFAULT_REGION=ap-south-1
            
            aws ecr get-login-password --region ap-south-1 | sudo docker login --username AWS --password-stdin ${{ secrets.ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

            # 4. Download RDS SSL Certificate (Ensuring it's a file, not a directory)
            sudo rm -rf /home/ubuntu/global-bundle.pem
            curl -o /home/ubuntu/global-bundle.pem https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem

            # 5. Pull and Run Containers
            sudo docker pull ${{ secrets.ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/octa-backend-repo:latest
            sudo docker pull ${{ secrets.ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/octa-frontend-repo:latest

            sudo docker stop backend || true
            sudo docker rm backend || true
            sudo docker stop frontend || true
            sudo docker rm frontend || true

            # Backend listens on 5001, we map to 5000
            sudo docker run -d \
              -p 5000:5001 \
              --name backend \
              -v /home/ubuntu/global-bundle.pem:/opt/app/global-bundle.pem \
              -e DB_USER=octaadmin \
              -e DB_PASSWORD=Octabyte123 \
              -e DB_NAME=octabytedb \
              -e DB_HOST=my-postgres-db.cnkkua2ykiim.ap-south-1.rds.amazonaws.com \
              -e PGSSLROOTCERT=/opt/app/global-bundle.pem \
              ${{ secrets.ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/octa-backend-repo:latest

            sudo docker run -d \
              -p 80:80 \
              --name frontend \
              ${{ secrets.ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/octa-frontend-repo:latest
          EOF

  # =========================
  # FAILURE NOTIFICATION
  # =========================
  notify:
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Failure Message
        run: echo "Pipeline failed"