name: octa-pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_FRONTEND: octa-frontend-repo
  ECR_BACKEND: octa-backend-repo

jobs:

  # =========================
  # TEST JOB
  # =========================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend Test
        run: |
          cd backend
          npm install
          npm test || true

      - name: Frontend Test
        run: |
          cd frontend
          npm install
          npm test -- --passWithNoTests || true

  # =========================
  # BUILD & PUSH DOCKER IMAGES
  # =========================
  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ---------- FRONTEND ----------
      - name: Build Frontend Docker Image
        run: |
          docker build -t frontend ./frontend

      - name: Tag Frontend Docker Image
        run: |
          docker tag frontend:latest \
          ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:latest

      - name: Push Frontend Docker Image
        run: |
          docker push \
          ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:latest

      # ---------- BACKEND ----------
      - name: Build Backend Docker Image
        run: |
          docker build -t backend ./backend

      - name: Tag Backend Docker Image
        run: |
          docker tag backend:latest \
          ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:latest

      - name: Push Backend Docker Image
        run: |
          docker push \
          ${{ secrets.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:latest

  # =========================
  # DEPLOY TO EC2
  # =========================
  deploy:
    needs: build
    runs-on: ubuntu-latest

    env:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SSH
        shell: bash
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p $HOME/.ssh
          printf "%s" "$EC2_SSH_KEY" > $HOME/.ssh/key.pem
          # Ensure file ends with a newline and has correct permissions
          sed -i '$a\' $HOME/.ssh/key.pem
          chmod 600 $HOME/.ssh/key.pem
          
          echo "Checking SSH key fingerprint..."
          ssh-keygen -l -f $HOME/.ssh/key.pem || echo "Error: Invalid key format"
          
          ssh-keyscan -H -T 10 "$EC2_HOST" >> $HOME/.ssh/known_hosts || true

      - name: Deploy Application
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
        run: |
          ssh -o StrictHostKeyChecking=no -i $HOME/.ssh/key.pem ubuntu@$EC2_HOST << EOF

            sudo systemctl start docker || true

            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com

            docker pull $ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/octa-backend-repo:latest

            docker pull $ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/octa-frontend-repo:latest

            docker stop backend || true
            docker rm backend || true

            docker stop frontend || true
            docker rm frontend || true

            docker run -d \
              -p 5000:5000 \
              --name backend \
              $ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/octa-backend-repo:latest

            docker run -d \
              -p 80:80 \
              --name frontend \
              $ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/octa-frontend-repo:latest

          EOF

  # =========================
  # FAILURE NOTIFICATION
  # =========================
  notify:
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Failure Message
        run: echo "Pipeline failed"